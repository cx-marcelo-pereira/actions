on: [push]

jobs:
  integration:
    runs-on: ubuntu-24.04
    name: 'Integration'
    steps:
      - name: "GitHub: checkout"
        uses: cx-marcelo-pereira/actions/github-checkout@main
      - name: "GitHub: setup"
        uses: cx-marcelo-pereira/actions/github-setup@main
        with:
          user_name: ${{ secrets.GH_USER }}
          user_email: ${{ secrets.GH_USER_EMAIL }}
          user_commit_signing_key: ${{ secrets.GH_USER_SIGNING_KEY }}
          user_pat: ${{ secrets.GH_USER_PAT }}
      - name: "NodeJS: setup"
        uses: cx-marcelo-pereira/actions/nodejs-setup@main
      - name: "Docker: setup"
        uses: cx-marcelo-pereira/actions/docker-setup@main
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_USER_PAT }}
      - name: "Helm: setup"
        uses: cx-marcelo-pereira/actions/helm-setup@main
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USER }}
          password: ${{ secrets.GH_USER_PAT }}
      - name: "Helm: publish chart"
        shell: bash
        run: |
          sed -i "s/0.0.0/25.0.1/g" charts/test-app/Chart.yaml
          echo "#############"
          cat charts/test-app/Chart.yaml
          echo "#############"
          helm dependency update charts/test-app
          helm package charts/test-app
          helm push test-app-25.0.1.tgz oci://ghcr.io/cx-marcelo-pereira/helm-charts 