on: [push]

jobs:
  integration:
    runs-on: ubuntu-24.04
    name: 'Integration'
    steps:
      - name: "Checkout"
        uses: cx-marcelo-pereira/actions/git-checkout@main
      - name: "Helm setup"
        uses: cx-marcelo-pereira/actions/helm-setup@main
        with:
          version: 'v4.0.4'
      - name: "GitHub release"
        uses: cx-marcelo-pereira/actions/github-release@main
      - name: "Helm publish"
        uses: cx-marcelo-pereira/actions/helm-publish@main
        with:
          chart: 'path/to/chart'
          dependencies-to-update: 
            - dependency1
            - dependency2
            - dependency3
          version: 'v4.0.4'